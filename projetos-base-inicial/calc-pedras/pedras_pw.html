<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora de Pedras — Perfect World</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --surface2: #f0ede8;
      --border: #e0ddd8;
      --border2: #ccc9c3;
      --text: #1a1916;
      --text2: #6b6860;
      --text3: #9e9b95;
      --radius: 10px;
      --radius-sm: 7px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
    }

    .top-bar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      gap: 12px;
      flex-wrap: wrap;
    }

    h2 {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 3px;
    }

    .sub {
      font-size: 13px;
      color: var(--text2);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .field label {
      font-size: 12px;
      color: var(--text2);
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    select, input[type=number] {
      height: 38px;
      border: 1px solid var(--border2);
      border-radius: var(--radius-sm);
      padding: 0 10px;
      font-size: 14px;
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    select:focus, input[type=number]:focus {
      border-color: #888;
    }

    input[type=number] { width: 150px; }

    .btn {
      height: 38px;
      padding: 0 20px;
      border: 1px solid var(--border2);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text);
      font-size: 14px;
      font-family: 'IBM Plex Sans', sans-serif;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn:hover { background: var(--surface2); border-color: #aaa; }
    .btn:active { transform: scale(0.98); }

    .btn-primary {
      background: var(--text);
      color: #fff;
      border-color: var(--text);
      font-weight: 500;
    }

    .btn-primary:hover { background: #333; border-color: #333; }

    .btn-config {
      font-size: 13px;
      padding: 0 14px;
      color: var(--text2);
      white-space: nowrap;
    }

    .btn-reset {
      font-size: 12px;
      padding: 0 12px;
      color: var(--text2);
    }

    .sep {
      height: 1px;
      background: var(--border);
      margin: 1rem 0;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text3);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    /* Config panel */
    .config-panel {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .config-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .config-header span {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .config-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
      gap: 8px;
      margin-bottom: 1rem;
    }

    .config-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 12px;
    }

    .config-item label {
      font-size: 13px;
      color: var(--text2);
      white-space: nowrap;
      flex: 1;
    }

    .config-item input {
      width: 52px;
      height: 30px;
      font-size: 13px;
      padding: 0 6px;
      text-align: center;
    }

    .config-item .x-label {
      font-size: 12px;
      color: var(--text3);
    }

    /* Result */
    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-top: 1rem;
    }

    .result-main {
      font-size: 36px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
      line-height: 1;
    }

    .result-label {
      font-size: 14px;
      color: var(--text2);
      margin-bottom: 1.25rem;
    }

    .cost-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }

    .cost-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 16px;
      flex: 1;
      min-width: 140px;
    }

    .cost-label {
      font-size: 11px;
      color: var(--text3);
      font-weight: 500;
      letter-spacing: 0.03em;
      margin-bottom: 3px;
    }

    .cost-val {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
    }

    /* Chain */
    .chain {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .stone {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .stone-box {
      padding: 7px 12px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 600;
      border: 1.5px solid;
    }

    .stone-count {
      font-size: 11px;
      color: var(--text3);
      font-weight: 500;
    }

    .arrow {
      font-size: 14px;
      color: var(--text3);
      margin-bottom: 18px;
    }

    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <div>
        <h2>Calculadora de Pedras</h2>
        <p class="sub">Sistema de combinação — Perfect World</p>
      </div>
      <button class="btn btn-config" onclick="toggleConfig()">⚙ Configurar multiplicadores</button>
    </div>

    <div id="configPanel" class="config-panel hidden">
      <div class="config-header">
        <span>Multiplicadores por nível</span>
        <button class="btn btn-reset" onclick="resetConfig()">Restaurar padrão</button>
      </div>
      <div class="config-grid" id="configGrid"></div>
      <button class="btn btn-primary" onclick="applyConfig()">Salvar configuração</button>
    </div>

    <div class="card">
      <div class="row">
        <div class="field">
          <label>Nível inicial (você tem)</label>
          <select id="fromLevel"></select>
        </div>
        <div class="field">
          <label>Nível alvo (você quer)</label>
          <select id="toLevel"></select>
        </div>
      </div>
      <div class="sep"></div>
      <div class="section-title">Preço das pedras (opcional)</div>
      <div class="row">
        <div class="field">
          <label id="priceLabel1">Preço — Nível 1</label>
          <input type="number" id="price1" placeholder="ex: 50000" min="0" />
        </div>
        <div class="field" id="price2Wrap">
          <label id="priceLabel2">Preço — Nível 2</label>
          <input type="number" id="price2" placeholder="ex: 180000" min="0" />
        </div>
      </div>
      <div class="sep"></div>
      <div class="section-title">Quantidade e orçamento (opcional)</div>
      <div class="row">
        <div class="field">
          <label>Quantas pedras nível alvo quero fazer</label>
          <input type="number" id="qtdAlvo" placeholder="ex: 5" min="1" />
        </div>
        <div class="field">
          <label>Moedas que tenho disponível</label>
          <input type="number" id="orcamento" placeholder="ex: 1000000" min="0" />
        </div>
      </div>
      <button class="btn btn-primary" onclick="calcular()">Calcular →</button>
    </div>

    <div id="resultArea" class="hidden">
      <div class="result-card">
        <div class="result-main" id="totalStones">—</div>
        <div class="result-label" id="totalLabel"></div>
        <div class="cost-row" id="costRow"></div>

        <div id="budgetArea" class="hidden">
          <div class="sep" style="margin-bottom:1rem"></div>
          <div class="section-title">Com suas moedas</div>
          <div class="cost-row" id="budgetRow"></div>
        </div>

        <div class="sep" style="margin-bottom:1rem"></div>
        <div class="section-title">Passo a passo (1 pedra nível alvo)</div>
        <div class="chain" id="chain"></div>
      </div>
    </div>
  </div>

  <script>
    const DEFAULT_MULT = [0, 0, 3, 3, 3, 4, 4, 4, 5, 5];
    let mult = [...DEFAULT_MULT];
    const maxLevel = 9;

    const COLORS = [
      null,
      { bg:'#dbeafe', border:'#3b82f6', text:'#1e40af' },
      { bg:'#dcfce7', border:'#22c55e', text:'#166534' },
      { bg:'#fef9c3', border:'#eab308', text:'#854d0e' },
      { bg:'#ffedd5', border:'#f97316', text:'#9a3412' },
      { bg:'#fce7f3', border:'#ec4899', text:'#9d174d' },
      { bg:'#ede9fe', border:'#8b5cf6', text:'#4c1d95' },
      { bg:'#ccfbf1', border:'#14b8a6', text:'#134e4a' },
      { bg:'#fee2e2', border:'#ef4444', text:'#991b1b' },
      { bg:'#f1f5f9', border:'#64748b', text:'#1e293b' },
    ];

    function stoneColor(lvl) {
      return COLORS[Math.min(lvl, COLORS.length - 1)] || COLORS[1];
    }

    function stonesBetween(from, to) {
      let needed = 1;
      for (let lvl = to; lvl > from; lvl--) needed *= mult[lvl];
      return needed;
    }

    function buildSelects() {
      const fromSel = document.getElementById('fromLevel');
      const toSel = document.getElementById('toLevel');
      const prevFrom = parseInt(fromSel.value) || 1;
      const prevTo = parseInt(toSel.value) || maxLevel;
      fromSel.innerHTML = '';
      toSel.innerHTML = '';
      for (let i = 1; i < maxLevel; i++) {
        fromSel.innerHTML += `<option value="${i}"${i===prevFrom?' selected':''}>Nível ${i}</option>`;
      }
      for (let i = 2; i <= maxLevel; i++) {
        toSel.innerHTML += `<option value="${i}"${i===prevTo?' selected':''}>Nível ${i}</option>`;
      }
      updateSelectConstraints();
    }

    function updateSelectConstraints() {
      const from = parseInt(document.getElementById('fromLevel').value);
      const toSel = document.getElementById('toLevel');
      Array.from(toSel.options).forEach(opt => { opt.disabled = parseInt(opt.value) <= from; });
      if (parseInt(toSel.value) <= from) {
        for (let opt of toSel.options) { if (parseInt(opt.value) > from) { toSel.value = opt.value; break; } }
      }
      document.getElementById('priceLabel1').textContent = `Preço — Nível ${from}`;
      document.getElementById('price2Wrap').style.display = from === 1 ? '' : 'none';
      document.getElementById('resultArea').classList.add('hidden');
    }

    function buildConfigGrid() {
      const grid = document.getElementById('configGrid');
      grid.innerHTML = '';
      for (let lvl = 2; lvl <= maxLevel; lvl++) {
        grid.innerHTML += `
          <div class="config-item">
            <label>Nível ${lvl} =</label>
            <input type="number" id="cfg${lvl}" value="${mult[lvl]}" min="2" max="20" />
            <span class="x-label">× N${lvl-1}</span>
          </div>`;
      }
    }

    function toggleConfig() {
      const panel = document.getElementById('configPanel');
      const isHidden = panel.classList.contains('hidden');
      if (isHidden) { buildConfigGrid(); panel.classList.remove('hidden'); }
      else panel.classList.add('hidden');
    }

    function applyConfig() {
      for (let lvl = 2; lvl <= maxLevel; lvl++) {
        const val = parseInt(document.getElementById('cfg' + lvl).value);
        if (val >= 2) mult[lvl] = val;
      }
      document.getElementById('configPanel').classList.add('hidden');
      document.getElementById('resultArea').classList.add('hidden');
    }

    function resetConfig() {
      mult = [...DEFAULT_MULT];
      buildConfigGrid();
      document.getElementById('resultArea').classList.add('hidden');
    }

    function calcular() {
      const from = parseInt(document.getElementById('fromLevel').value);
      const to = parseInt(document.getElementById('toLevel').value);
      if (from >= to) { alert('O nível alvo precisa ser maior que o nível inicial!'); return; }

      const totalPor1 = stonesBetween(from, to);
      const qtd = parseInt(document.getElementById('qtdAlvo').value) || 1;
      const totalGeral = totalPor1 * qtd;

      // Título principal
      if (qtd > 1) {
        document.getElementById('totalStones').textContent = totalGeral.toLocaleString('pt-BR');
        document.getElementById('totalLabel').textContent =
          `pedras nível ${from} para criar ${qtd} pedras nível ${to} (${totalPor1.toLocaleString('pt-BR')} por pedra)`;
      } else {
        document.getElementById('totalStones').textContent = totalPor1.toLocaleString('pt-BR');
        document.getElementById('totalLabel').textContent = `pedras nível ${from} para criar 1 pedra nível ${to}`;
      }

      // Custos por preço
      const p1 = parseFloat(document.getElementById('price1').value) || 0;
      const p2 = parseFloat(document.getElementById('price2').value) || 0;
      const costRow = document.getElementById('costRow');
      costRow.innerHTML = '';
      if (p1 > 0) {
        const custoTotal = totalGeral * p1;
        costRow.innerHTML += `
          <div class="cost-item">
            <div class="cost-label">Custo total (nível ${from})${qtd > 1 ? ` × ${qtd}` : ''}</div>
            <div class="cost-val">${custoTotal.toLocaleString('pt-BR')}</div>
          </div>`;
      }
      if (p2 > 0 && from === 1) {
        const stones2 = stonesBetween(2, to) * qtd;
        costRow.innerHTML += `
          <div class="cost-item">
            <div class="cost-label">Custo total (nível 2)${qtd > 1 ? ` × ${qtd}` : ''}</div>
            <div class="cost-val">${(stones2 * p2).toLocaleString('pt-BR')}</div>
          </div>`;
      }

      // Orçamento
      const orc = parseFloat(document.getElementById('orcamento').value) || 0;
      const budgetArea = document.getElementById('budgetArea');
      const budgetRow = document.getElementById('budgetRow');
      budgetRow.innerHTML = '';

      if (orc > 0 && p1 > 0) {
        const custoPor1 = totalPor1 * p1;
        const quantasDa = Math.floor(orc / custoPor1);
        const gastoReal = quantasDa * custoPor1;
        const sobra = orc - gastoReal;

        budgetRow.innerHTML += `
          <div class="cost-item" style="border-color:${quantasDa >= qtd ? '#22c55e' : '#f97316'};background:${quantasDa >= qtd ? '#dcfce7' : '#ffedd5'}">
            <div class="cost-label" style="color:${quantasDa >= qtd ? '#166534' : '#9a3412'}">Pedras nível ${to} que consigo fazer</div>
            <div class="cost-val" style="color:${quantasDa >= qtd ? '#166534' : '#9a3412'}">${quantasDa.toLocaleString('pt-BR')}</div>
          </div>
          <div class="cost-item">
            <div class="cost-label">Moedas gastas</div>
            <div class="cost-val">${gastoReal.toLocaleString('pt-BR')}</div>
          </div>
          <div class="cost-item">
            <div class="cost-label">Moedas que sobram</div>
            <div class="cost-val">${sobra.toLocaleString('pt-BR')}</div>
          </div>`;

        if (qtd > 1) {
          const faltam = Math.max(0, qtd - quantasDa);
          if (faltam > 0) {
            const faltamMoedas = faltam * custoPor1;
            budgetRow.innerHTML += `
              <div class="cost-item" style="border-color:#ef4444;background:#fee2e2">
                <div class="cost-label" style="color:#991b1b">Faltam para sua meta (${qtd}x)</div>
                <div class="cost-val" style="color:#991b1b">${faltam}x pedra · ${faltamMoedas.toLocaleString('pt-BR')} moedas</div>
              </div>`;
          } else {
            budgetRow.innerHTML += `
              <div class="cost-item" style="border-color:#22c55e;background:#dcfce7">
                <div class="cost-label" style="color:#166534">Meta atingida!</div>
                <div class="cost-val" style="color:#166534">Você consegue fazer ${qtd}x ✓</div>
              </div>`;
          }
        }

        budgetArea.classList.remove('hidden');
      } else if (orc > 0 && p1 === 0) {
        budgetRow.innerHTML = `<div class="cost-item"><div class="cost-label">Atenção</div><div class="cost-val" style="font-size:14px;color:var(--text2)">Informe o preço da pedra para calcular o orçamento</div></div>`;
        budgetArea.classList.remove('hidden');
      } else {
        budgetArea.classList.add('hidden');
      }

      // Chain (sempre para 1 pedra alvo)
      const chain = document.getElementById('chain');
      chain.innerHTML = '';
      for (let lvl = from; lvl <= to; lvl++) {
        const count = stonesBetween(from, lvl);
        const c = stoneColor(lvl);
        chain.innerHTML += `
          <div class="stone">
            <div class="stone-box" style="background:${c.bg};border-color:${c.border};color:${c.text}">N${lvl}</div>
            <div class="stone-count">${count.toLocaleString('pt-BR')}x</div>
          </div>
          ${lvl < to ? '<div class="arrow">→</div>' : ''}`;
      }
      document.getElementById('resultArea').classList.remove('hidden');
    }

    document.getElementById('fromLevel').addEventListener('change', updateSelectConstraints);
    buildSelects();
    document.getElementById('price2Wrap').style.display = 'none';
  </script>
</body>
</html>
